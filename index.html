<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Leben — kiosko</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Playfair+Display:ital,wght@1,500;1,600&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0d0d0d;--paper:#fff;--gris:#9a9a9a;--linea:#ececec;--rojo:#b81d2c;--rojosoft:#fdf3f3;--verde:#1f9d57;
        --soft:#fafafa;--pop:rgba(255,255,255,.97);--faint:#6a6a6a;
        --helv:'Helvetica Neue',Helvetica,Arial,sans-serif}
  body.dark{--ink:#f1efe9;--paper:#0c0c0c;--gris:#8f8f8f;--linea:#272727;--rojo:#d62434;--soft:#161616;--pop:rgba(10,10,10,.97);--faint:#a6a6a6}
  body.dark .leben{color:var(--ink)}
  .themebtn{position:fixed;top:18px;right:22px;z-index:70;width:42px;height:42px;border-radius:50%;border:1.5px solid var(--linea);background:var(--paper);color:var(--ink);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:.2s}
  .themebtn:active{transform:scale(.92)}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:var(--paper);color:var(--ink);font-family:'Space Grotesk',sans-serif;-webkit-font-smoothing:antialiased;display:flex;overflow:hidden}

  /* ---------- TICKET (IZQUIERDA) — Helvetica ---------- */
  .rail{width:330px;height:100vh;border-right:1px solid var(--linea);display:flex;flex-direction:column;padding:26px 22px 20px;background:var(--paper);flex-shrink:0;font-family:var(--helv)}
  .rail .leben{font-family:'Playfair Display',serif;font-style:italic;font-weight:600;font-size:34px;color:var(--rojo);text-align:center;line-height:1}
  .rail .rsub{text-align:center;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gris);margin:3px 0 16px;font-family:var(--helv)}
  .items{flex:1;overflow-y:auto;margin-right:-6px;padding-right:6px}
  .pname{font-size:13px;font-weight:600;text-align:center;margin-bottom:10px;letter-spacing:.5px}
  .combo{padding:11px 0;border-bottom:1px solid var(--linea)}
  .combo.draft{border:1px dashed var(--linea);border-radius:12px;background:var(--soft);padding:11px 12px;margin-top:8px;animation:fade .3s ease}
  .ch{display:flex;justify-content:space-between;align-items:baseline;font-weight:600;font-size:14px;letter-spacing:.2px}
  .cr{font-weight:700;white-space:nowrap}
  .cx{color:var(--gris);cursor:pointer;font-weight:400;margin-left:8px}
  .encurso{font-size:9px;color:var(--gris);border:1px solid var(--linea);border-radius:20px;padding:2px 7px;margin-left:6px;text-transform:uppercase;letter-spacing:1px;font-weight:400}
  .cl{display:flex;justify-content:space-between;font-weight:300;font-size:13px;color:var(--faint);padding:4px 0 4px 12px}
  .cl.disc{color:var(--verde);font-weight:500}
  .empty{color:#d0d0d0;font-size:13px;text-align:center;margin-top:50px;letter-spacing:1px;line-height:1.7}
  .pnote{margin-top:12px;font-size:12px;color:var(--gris);font-style:italic;line-height:1.5}
  .total{display:flex;justify-content:space-between;align-items:baseline;padding:14px 0 12px;border-top:2px solid var(--ink);margin-top:8px}
  .total .tt{font-size:12px;letter-spacing:2px;text-transform:uppercase;font-weight:600}
  .total .tv{font-size:26px;font-weight:700}
  .railbtns{display:flex;flex-direction:column;gap:8px}
  .finalizar{width:100%;background:var(--rojo);color:#fff;border:none;font-family:var(--helv);font-weight:600;font-size:13px;letter-spacing:2px;text-transform:uppercase;padding:16px;border-radius:50px;cursor:pointer;display:none}
  .finalizar.show{display:block}

  /* ---------- STAGE ---------- */
  .stage{flex:1;height:100vh;overflow-y:auto;position:relative}
  .panel{display:none;min-height:100vh;flex-direction:column;justify-content:center;align-items:center;padding:64px 170px 64px 50px}
  .panel.active{display:flex;animation:fade .4s ease}
  @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .dots{position:absolute;top:26px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:5}
  .dots i{width:8px;height:8px;border-radius:50%;background:var(--linea);transition:.3s}
  .dots i.on{background:var(--rojo);transform:scale(1.3)}
  .back{position:absolute;top:22px;left:26px;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--gris);background:none;border:none;cursor:pointer;display:none;z-index:5}
  .back.show{display:block}
  .ptitle{font-family:'Marcellus',serif;font-size:clamp(24px,3.2vw,38px);margin-bottom:4px;text-align:center}
  .pmini{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--gris);margin-bottom:30px;text-align:center}

  /* hamburguesas */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:30px;width:min(680px,100%)}
  .burger{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:.2s;min-height:270px;padding:8px}
  .burger:active{transform:scale(.99)}
  .burger.chosen .nm{color:var(--rojo)}
  .burger .star{position:absolute;top:2px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--rojo)}
  .burger .em{font-size:clamp(82px,12vw,160px);filter:drop-shadow(0 20px 15px rgba(0,0,0,.16));animation:flotar 4.6s ease-in-out infinite,girar 10s linear infinite}
  .burger:nth-child(2) .em{animation-delay:-1.2s,-3s}.burger:nth-child(3) .em{animation-delay:-2.4s,-6s}.burger:nth-child(4) .em{animation-delay:-3.6s,-1.5s}
  @keyframes flotar{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  @keyframes girar{from{transform:rotateY(0)}to{transform:rotateY(360deg)}}
  .burger .nm{margin-top:16px;font-family:'Marcellus',serif;font-size:clamp(17px,2.2vw,25px)}
  .sizes{position:absolute;inset:0;background:var(--pop);border-radius:22px;display:none;flex-direction:column;justify-content:center;align-items:center;gap:11px;padding:16px}
  .burger.open .sizes{display:flex}
  .sizes .sttl{font-family:'Marcellus',serif;font-size:17px;margin-bottom:2px}
  .sizeview,.extraview{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%}
  .extraview{display:none}
  .sizes.pickextras .sizeview{display:none}
  .sizes.pickextras .extraview{display:flex}
  .extrachips{display:flex;flex-direction:column;gap:7px;width:100%;align-items:center}
  .pill.mini{font-size:12px;letter-spacing:.5px;padding:10px 16px;min-height:42px;min-width:0;text-transform:none}
  .pill.mini.sel{background:var(--rojo);color:#fff;border-color:var(--rojo)}
  .okcheck{width:56px;height:56px;border-radius:50%;background:var(--verde);color:#fff;border:none;font-size:28px;line-height:1;cursor:pointer;margin-top:6px;display:flex;align-items:center;justify-content:center}
  .okcheck:active{transform:scale(.92)}

  .pill{font-family:'Space Grotesk';font-size:15px;letter-spacing:1px;text-transform:uppercase;padding:15px 28px;border-radius:50px;border:1.5px solid var(--ink);background:var(--paper);color:var(--ink);cursor:pointer;min-height:54px;min-width:130px;transition:.18s}
  .pill:active{transform:scale(.97)}.pill.sel{background:var(--ink);color:var(--paper)}

  /* steppers */
  .qrow{display:flex;justify-content:space-between;align-items:center;width:min(540px,100%);padding:22px 4px;border-bottom:1px solid var(--linea)}
  .qrow .ql{font-family:'Marcellus',serif;font-size:clamp(20px,2.4vw,27px)}
  .qrow .qp{font-size:12px;color:var(--gris)}
  .stepper{display:flex;align-items:center;gap:16px}
  .stepper button{width:54px;height:54px;border-radius:50%;border:1.5px solid var(--ink);background:var(--paper);color:var(--ink);font-size:26px;cursor:pointer;line-height:1;transition:.15s}
  .stepper button:active{transform:scale(.92);background:var(--ink);color:var(--paper)}
  .stepper .n{font-family:'Marcellus',serif;font-size:26px;min-width:30px;text-align:center}

  /* bebidas */
  .dblock{width:min(700px,100%)}
  .dlabel{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gris);text-align:left;margin:16px 4px 12px}
  .dgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}
  .dgrid.g3{grid-template-columns:repeat(3,1fr)}
  .dgrid.g2{grid-template-columns:repeat(2,1fr);max-width:340px;margin:0 auto}
  .drink{padding:10px 8px;display:flex;flex-direction:column;align-items:center;gap:5px;transition:.18s}
  .drink.sel .dn,.drink.sel .dp{color:var(--rojo)}
  .drink .di{font-size:40px;filter:drop-shadow(0 11px 9px rgba(0,0,0,.13))}
  .drink .dn{font-size:12px;letter-spacing:1px;text-transform:uppercase}.drink .dp{font-size:11px;color:var(--gris)}
  .drink .cflag{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--rojo)}
  .dstep{display:flex;align-items:center;gap:10px;margin-top:6px}
  .dstep button{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--linea);background:var(--paper);color:var(--ink);font-size:18px;cursor:pointer;line-height:1}
  .dstep button:active{background:var(--ink);color:var(--paper)}
  .dstep .dq{font-family:'Marcellus',serif;font-size:17px;min-width:18px;text-align:center}
  .drinkhint{font-size:11px;color:var(--gris);text-align:center;margin-top:18px;letter-spacing:1px}

  /* nombre + comentarios */
  .form{width:min(540px,100%);display:flex;flex-direction:column;gap:16px}
  .form input,.form textarea{width:100%;border:1.5px solid var(--linea);border-radius:16px;padding:18px;font-family:'Space Grotesk';font-size:17px;outline:none;background:transparent;color:var(--ink)}
  .form input::placeholder,.form textarea::placeholder{color:var(--gris)}
  .form textarea{min-height:110px;resize:none}
  .form input:focus,.form textarea:focus{border-color:var(--ink)}
  .flbl{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gris);margin-bottom:-6px;text-align:left}
  .confirmbtn{margin-top:8px;background:var(--rojo);color:#fff;border-color:var(--rojo)}

  /* ---------- FLECHA ABAJO (DERECHA) ---------- */
  .advance{position:fixed;right:34px;top:50%;transform:translateY(-50%);z-index:60;background:var(--rojo);color:#fff;border:none;cursor:pointer;width:118px;height:118px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:42px;box-shadow:0 18px 40px rgba(184,29,44,.34);transition:.18s}
  .advance:active{transform:translateY(-50%) scale(.94)}
  .advance.hide{display:none}

  /* CHECK VERDE — agregar combo (mismo tamaño que la flecha) */
  .addcombo{position:fixed;right:34px;top:calc(50% + 70px);z-index:61;width:118px;height:118px;border-radius:50%;background:var(--verde);color:#fff;border:none;cursor:pointer;font-size:48px;line-height:1;display:none;align-items:center;justify-content:center;box-shadow:0 16px 38px rgba(31,157,87,.36);animation:pop .28s ease}
  .addcombo.show{display:flex}
  .addcombo:active{transform:scale(.92)}
  @keyframes pop{from{transform:scale(.55);opacity:0}to{transform:scale(1);opacity:1}}

  /* QR */
  .qrbtn{position:fixed;left:354px;bottom:22px;z-index:55;background:var(--paper);color:var(--ink);border:1.5px solid var(--ink);border-radius:50px;padding:12px 18px;font-size:12px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;display:flex;gap:8px;align-items:center}
  .qrov{position:fixed;inset:0;z-index:90;background:var(--pop);display:none;flex-direction:column;justify-content:center;align-items:center;gap:16px;text-align:center;padding:30px}
  .qrov.show{display:flex}
  .qrov .leben{font-family:'Playfair Display',serif;font-style:italic;font-weight:600;font-size:46px;color:var(--rojo)}
  .qrov img{width:240px;height:240px;border:1px solid var(--linea);border-radius:12px}
  .qrov .qx{margin-top:6px;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--gris);background:none;border:none;cursor:pointer}

  /* final */
  .done{position:fixed;inset:0;z-index:95;background:var(--paper);display:none;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:30px;animation:fade .4s ease}
  .done.show{display:flex}
  .done .leben{font-family:'Playfair Display',serif;font-style:italic;font-weight:600;font-size:58px;color:var(--rojo)}
  .done .big{font-family:'Marcellus',serif;font-size:32px;margin-top:16px}
  .done .num{font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--gris);margin-top:10px}
  .done .reset{margin-top:38px;background:var(--ink);color:var(--paper);border:none;font-size:13px;letter-spacing:2px;text-transform:uppercase;padding:18px 40px;border-radius:50px;cursor:pointer}

  /* ---------- RESPONSIVE ---------- */
  @media(max-width:860px){
    html,body{overflow:auto;height:auto}
    body{flex-direction:column}
    .rail{width:100%;height:auto;position:sticky;top:0;z-index:40;max-height:44vh;border-right:none;border-bottom:2px solid var(--ink);padding:14px 16px}
    .rail .leben{font-size:25px}.rail .rsub{margin:2px 0 8px}
    .stage{height:auto}
    .panel{min-height:auto;padding:30px 16px 150px}
    .burger{min-height:200px;padding:6px}
    .dgrid{grid-template-columns:repeat(2,1fr)}
    .dots{position:static;transform:none;margin-bottom:12px}
    .back{position:static;margin-bottom:6px}
    .advance{right:14px;left:14px;top:auto;bottom:14px;transform:none;width:auto;height:58px;border-radius:40px;font-size:24px}
    .advance:active{transform:scale(.97)}
    .addcombo{right:14px;left:14px;top:auto;bottom:80px;width:auto;height:54px;border-radius:40px;font-size:24px}
    .qrbtn{display:none}
    .ptitle{font-size:26px}.pmini{font-size:11px}
    .rail .leben{font-size:23px}.ch{font-size:13px}.cl{font-size:12px}.total .tv{font-size:23px}
    .burger .nm{font-size:16px}
    .qrow .ql{font-size:20px}
  }
  @media(max-width:430px){
    .ptitle{font-size:23px}
    .stepper button{width:48px;height:48px;font-size:23px}
    .drink .dn{font-size:11px}
  }
</style>
</head>
<body>

  <!-- TICKET -->
  <aside class="rail">
    <div class="leben">Leben</div>
    <div class="rsub">tu pedido</div>
    <div class="items" id="items"></div>
    <div class="total"><span class="tt">Total</span><span class="tv" id="total">$0</span></div>
    <div class="railbtns">
      <button class="finalizar" id="fin" onclick="finalizar()">Finalizar pedido →</button>
    </div>
  </aside>

  <!-- STAGE -->
  <div class="stage">
    <div class="dots"><i class="on"></i><i></i><i></i></div>
    <button class="back" id="back" onclick="goBack()">← atrás</button>

    <!-- 01 HAMBURGUESA -->
    <div class="panel active" id="p1">
      <div class="grid2" id="burgers"></div>
    </div>

    <!-- 02 ACOMPAÑAMIENTO -->
    <div class="panel" id="p2">
      <div class="dblock">
        <div class="dlabel">Para acompañar</div><div class="dgrid g2" id="sides"></div>
        <div class="dlabel">Empanada frita</div><div class="dgrid" id="empanadas"></div>
        <div class="dlabel">Pizza</div><div class="dgrid g3" id="pizzas"></div>
      </div>
    </div>

    <!-- 03 BEBIDA -->
    <div class="panel" id="p3">
      <div class="dblock">
        <div class="dlabel">Cervezas de la casa</div><div class="dgrid" id="beers"></div>
        <div class="dlabel">Sin alcohol</div><div class="dgrid" id="sodas"></div>
      </div>
    </div>

    <!-- 04 NOMBRE + COMENTARIOS -->
    <div class="panel" id="p4">
      <div class="form">
        <div class="flbl">Tu nombre</div>
        <input id="name" placeholder="Ej: Marcos" oninput="renderTicket()">
        <div class="flbl">Comentarios</div>
        <textarea id="notes" placeholder="Alergias, sacarle algo, lo que sea…" oninput="renderTicket()"></textarea>
        <button class="pill confirmbtn" onclick="confirmar()">Confirmar pedido ✓</button>
      </div>
    </div>
  </div>

  <!-- INTERRUPTOR CLARO / OSCURO -->
  <button class="themebtn" id="themebtn" onclick="toggleTheme()" title="Claro / Oscuro">☾</button>

  <!-- FLECHA + CHECK -->
  <button class="advance" id="adv" onclick="advance()">↓</button>
  <button class="addcombo" id="addc" onclick="addCombo()" title="Agregar combo">✓</button>

  <!-- QR -->
  <button class="qrbtn" onclick="document.getElementById('qrov').classList.add('show')">📱 Pedí desde tu celu</button>
  <div class="qrov" id="qrov">
    <div class="leben">Leben</div>
    <div style="font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--gris)">Escaneá y pedí desde tu teléfono</div>
    <img id="qrimg" alt="QR">
    <button class="qx" onclick="document.getElementById('qrov').classList.remove('show')">cerrar ✕</button>
  </div>

  <!-- FINAL -->
  <div class="done" id="done">
    <div class="leben">Leben</div>
    <div class="big" id="doneBig">Retiralo por la ventana ↗</div>
    <div class="num" id="doneNum"></div>
    <button class="reset" onclick="reset()">↺ Nuevo pedido</button>
  </div>

<script>
  /* ===== CONFIG EDITABLE ===== */
  var MENU={
    burgers:[
      {name:"emilio's",           price:16000, star:true},
      {name:"cheeseburger",       price:13000},
      {name:"blt",                price:14000},
      {name:"bacon cheeseburger", price:15000}
    ],
    dobleExtra:4000,
    sides:{papas:4000, nuggets:5000},
    comboDiscount:3000,                          // descuento si el combo califica
    extras:[{name:"Cheddar",price:1500},{name:"Bacon",price:2500},{name:"Salsa",price:1000}],
    empanadas:[{name:"Carne",price:2800},{name:"Jamón y queso",price:2800},{name:"Cuatro quesos",price:2800},{name:"Cebolla y queso",price:2800}],
    pizzas:[{name:"Pepperoni",price:9000},{name:"Margherita",price:8500},{name:"Cuatro quesos",price:9000}],
    beers:[{name:"Rubia",price:3500,combo:true},{name:"Roja",price:4500},{name:"IPA",price:6000},{name:"Negra",price:5500}],
    sodas:[{name:"Coca",price:4000,combo:true},{name:"Sprite",price:4000,combo:true},{name:"Fanta",price:4000,combo:true},{name:"Agua",price:4000,combo:true}]
  };
  var PEDIR_URL="https://perilli-pana.github.io/leben-pedir/";
  /* =========================== */

  var COMBO_DRINKS={}; MENU.beers.concat(MENU.sodas).forEach(function(d){if(d.combo)COMBO_DRINKS[d.name]=true;});
  var order={combos:[], name:"", notes:""};
  var draft={burger:null,papas:0,nuggets:0,drinks:{},empanadas:{},pizzas:{}};
  function freshDraft(){return {burger:null,papas:0,nuggets:0,drinks:{},empanadas:{},pizzas:{}};}
  var current=1, dots=document.querySelectorAll('.dots i');
  function money(n){return '$'+n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,'.');}
  function drinkPrice(name){var a=MENU.beers.concat(MENU.sodas),i;for(i=0;i<a.length;i++)if(a[i].name===name)return a[i].price;return 0;}

  /* hamburguesas con tamaño + extras */
  function closeOverlays(except){document.querySelectorAll('.burger').forEach(function(x){if(x!==except){x.classList.remove('open');x.querySelector('.sizes').classList.remove('pickextras');}});}
  (function(){var bc=document.getElementById('burgers');
    var chips=MENU.extras.map(function(x){return '<button class="pill mini" data-x="'+x.name+'" data-xp="'+x.price+'">+ '+x.name+' · '+money(x.price)+'</button>';}).join('');
    MENU.burgers.forEach(function(b){
    var el=document.createElement('div');el.className='burger';
    el.innerHTML=(b.star?'<div class="star">best seller</div>':'')+'<div class="em">🍔</div><div class="nm">'+b.name+'</div>'+
      '<div class="sizes">'+
        '<div class="sizeview"><div class="sttl">'+b.name+'</div>'+
          '<button class="pill" data-s="simple">Simple · '+money(b.price)+'</button>'+
          '<button class="pill" data-s="doble">Doble · '+money(b.price+MENU.dobleExtra)+'</button></div>'+
        '<div class="extraview"><div class="sttl">¿Extras?</div><div class="extrachips">'+chips+'</div>'+
          '<button class="okcheck" data-add="1">✓</button></div>'+
      '</div>';
    el.onclick=function(e){var t=e.target,sz=el.querySelector('.sizes');
      if(t.dataset.s){el.dataset.size=t.dataset.s;el.dataset.sizeprice=(t.dataset.s==='doble'?b.price+MENU.dobleExtra:b.price);sz.classList.add('pickextras');return;}
      if(t.dataset.x!==undefined){t.classList.toggle('sel');return;}
      if(t.dataset.add!==undefined){
        var extras=[];el.querySelectorAll('.extrachips .pill.sel').forEach(function(c){extras.push({name:c.dataset.x,price:+c.dataset.xp});});
        draft.burger={name:b.name,size:el.dataset.size,price:+el.dataset.sizeprice,extras:extras};
        document.querySelectorAll('.burger').forEach(function(x){x.classList.remove('open','chosen');x.querySelector('.sizes').classList.remove('pickextras');x.querySelectorAll('.extrachips .pill').forEach(function(c){c.classList.remove('sel')});});
        el.classList.add('chosen');renderTicket();return;}
      closeOverlays(el);sz.classList.remove('pickextras');el.classList.toggle('open');
    };bc.appendChild(el);});})();

  /* cards con cantidad (bebidas / empanadas / pizzas) */
  function makeCards(arr,box,storeKey,emojiFn){var g=document.getElementById(box);arr.forEach(function(d){
    var el=document.createElement('div');el.className='drink';
    el.innerHTML='<span class="di">'+emojiFn(d)+'</span><span class="dn">'+d.name+'</span><span class="dp">'+money(d.price)+'</span>'+
      (d.combo?'<span class="cflag">combo</span>':'')+
      '<div class="dstep"><button>−</button><span class="dq">0</span><button>+</button></div>';
    var dq=el.querySelector('.dq'),btns=el.querySelectorAll('.dstep button');
    btns[0].onclick=function(){stepItem(storeKey,d.name,-1,dq,el)};btns[1].onclick=function(){stepItem(storeKey,d.name,1,dq,el)};
    g.appendChild(el);});}
  makeCards(MENU.beers,'beers','drinks',function(){return '🍺'});
  makeCards(MENU.sodas,'sodas','drinks',function(d){return d.name==='Agua'?'💧':'🥤'});
  makeCards(MENU.empanadas,'empanadas','empanadas',function(){return '🥟'});
  makeCards(MENU.pizzas,'pizzas','pizzas',function(){return '🍕'});
  (function(){var g=document.getElementById('sides');
    [{name:'Papas fritas',key:'papas',emoji:'🍟'},{name:'Nuggets de pollo',key:'nuggets',emoji:'🍗'}].forEach(function(d){
      var el=document.createElement('div');el.className='drink';
      el.innerHTML='<span class="di">'+d.emoji+'</span><span class="dn">'+d.name+'</span><span class="dp">'+money(MENU.sides[d.key])+'</span><div class="dstep"><button>−</button><span class="dq">0</span><button>+</button></div>';
      var dq=el.querySelector('.dq'),btns=el.querySelectorAll('.dstep button');
      btns[0].onclick=function(){sideStep(d.key,-1,dq,el)};btns[1].onclick=function(){sideStep(d.key,1,dq,el)};
      g.appendChild(el);});})();
  function stepItem(storeKey,name,delta,dq,el){var s=draft[storeKey],v=Math.max(0,(s[name]||0)+delta);if(v)s[name]=v;else delete s[name];dq.textContent=v;el.classList.toggle('sel',v>0);renderTicket();}
  function sideStep(key,delta,dq,el){draft[key]=Math.max(0,draft[key]+delta);dq.textContent=draft[key];el.classList.toggle('sel',draft[key]>0);renderTicket();}

  /* combos / totales */
  function priceIn(arr,name){for(var i=0;i<arr.length;i++)if(arr[i].name===name)return arr[i].price;return 0;}
  function qualifies(c){if(!c.burger||c.papas<1)return false;for(var k in c.drinks)if(COMBO_DRINKS[k])return true;return false;}
  function groupTotal(c){
    var t=0,k;
    if(c.burger){t+=c.burger.price;(c.burger.extras||[]).forEach(function(x){t+=x.price});}
    t+=c.papas*MENU.sides.papas+c.nuggets*MENU.sides.nuggets;
    for(k in c.drinks)t+=c.drinks[k]*drinkPrice(k);
    for(k in (c.empanadas||{}))t+=c.empanadas[k]*priceIn(MENU.empanadas,k);
    for(k in (c.pizzas||{}))t+=c.pizzas[k]*priceIn(MENU.pizzas,k);
    if(qualifies(c))t-=MENU.comboDiscount;
    return t;
  }
  function hasDraft(){return draft.burger||draft.papas||draft.nuggets||Object.keys(draft.drinks).length||Object.keys(draft.empanadas).length||Object.keys(draft.pizzas).length;}
  function liLine(label,price){return '<div class="cl"><span>'+label+'</span><span>'+money(price)+'</span></div>';}

  function groupHTML(c,idx){
    var st=groupTotal(c),lines='',k;
    var title=c.burger?(c.burger.name+' · '+c.burger.size):'Suelto';
    var right=(idx===null?'<span class="encurso">en curso</span>':'<span class="cx" onclick="delCombo('+idx+')">✕</span>');
    var head='<div class="ch"><span class="ct">'+title+'</span><span class="cr">'+(c.burger?money(c.burger.price):'')+right+'</span></div>';
    if(c.burger&&c.burger.extras)c.burger.extras.forEach(function(x){lines+=liLine('+ '+x.name.toLowerCase(),x.price);});
    if(c.papas)lines+=liLine('papas ×'+c.papas,c.papas*MENU.sides.papas);
    if(c.nuggets)lines+=liLine('nuggets ×'+c.nuggets,c.nuggets*MENU.sides.nuggets);
    for(k in (c.empanadas||{}))lines+=liLine('empanada '+k.toLowerCase()+' ×'+c.empanadas[k],c.empanadas[k]*priceIn(MENU.empanadas,k));
    for(k in (c.pizzas||{}))lines+=liLine('pizza '+k.toLowerCase()+' ×'+c.pizzas[k],c.pizzas[k]*priceIn(MENU.pizzas,k));
    for(k in c.drinks)lines+=liLine(k+' ×'+c.drinks[k],c.drinks[k]*drinkPrice(k));
    if(qualifies(c))lines+='<div class="cl disc"><span>🎁 Combo</span><span>−'+money(MENU.comboDiscount)+'</span></div>';
    return '<div class="combo'+(idx===null?' draft':'')+'">'+head+lines+'</div>';
  }

  function renderTicket(){
    var box=document.getElementById('items'),html='',total=0;
    order.name=document.getElementById('name').value.trim();
    order.notes=document.getElementById('notes').value.trim();
    if(order.name)html+='<div class="pname">Pedido de '+order.name+'</div>';
    order.combos.forEach(function(c,i){total+=groupTotal(c);html+=groupHTML(c,i);});
    if(hasDraft()){total+=groupTotal(draft);html+=groupHTML(draft,null);}
    if(!html||(!order.combos.length&&!hasDraft()))html='<div class="empty">Tu ticket está vacío.<br>Tocá una hamburguesa →</div>';
    if(order.notes)html+='<div class="pnote">“'+order.notes+'”</div>';
    box.innerHTML=html;
    document.getElementById('total').textContent=money(total);
    document.getElementById('fin').classList.toggle('show', order.combos.length>0||hasDraft());
    updateFloating();
  }
  function delCombo(i){order.combos.splice(i,1);renderTicket();}

  /* draft -> combo */
  function pushDraft(){if(!hasDraft())return;order.combos.push({burger:draft.burger,papas:draft.papas,nuggets:draft.nuggets,drinks:Object.assign({},draft.drinks),empanadas:Object.assign({},draft.empanadas),pizzas:Object.assign({},draft.pizzas)});draft=freshDraft();resetDraftUI();}
  function resetDraftUI(){
    document.querySelectorAll('.burger').forEach(function(x){x.classList.remove('open','chosen');x.querySelector('.sizes').classList.remove('pickextras');x.querySelectorAll('.extrachips .pill').forEach(function(c){c.classList.remove('sel')});});
    document.querySelectorAll('.drink').forEach(function(x){x.classList.remove('sel');x.querySelector('.dq').textContent='0';});
  }
  function addCombo(){pushDraft();renderTicket();show(1);}
  function updateFloating(){
    var build=current<=3;
    document.getElementById('adv').classList.toggle('hide',!build);
    document.getElementById('addc').classList.toggle('show', build && !!hasDraft());
  }

  /* navegación: la flecha solo baja (1→2→3); en el último paso cierra el combo y arranca otro */
  function show(n){
    document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active')});
    document.getElementById('p'+n).classList.add('active');
    document.querySelector('.stage').scrollTop=0;
    for(var i=0;i<dots.length;i++)dots[i].classList.toggle('on',i<(n>3?0:n));
    document.querySelector('.dots').style.visibility=(n>3?'hidden':'visible');
    document.getElementById('back').classList.toggle('show',n>3);
    current=n;updateFloating();
  }
  function advance(){
    if(current===1)show(2);
    else if(current===2)show(3);
    else if(current===3)show(1);   /* nunca cierra el combo: el verde es el único que cierra */
  }
  function goBack(){if(current>3)show(1);}

  function finalizar(){pushDraft();if(!order.combos.length)return;renderTicket();show(4);}
  function confirmar(){
    var n=order.combos.length;
    document.getElementById('doneBig').textContent=(order.name?order.name+', ':'')+'retiralo por la ventana ↗';
    document.getElementById('doneNum').textContent='Pedido #'+(100+n)+' · '+n+(n===1?' combo':' combos');
    document.getElementById('done').classList.add('show');
  }
  function reset(){
    order={combos:[],name:"",notes:""};draft=freshDraft();
    document.getElementById('name').value='';document.getElementById('notes').value='';
    resetDraftUI();document.getElementById('done').classList.remove('show');renderTicket();show(1);
  }

  function toggleTheme(){var d=document.body.classList.toggle('dark');document.getElementById('themebtn').textContent=d?'☀':'☾';}
  document.getElementById('qrimg').src='https://api.qrserver.com/v1/create-qr-code/?size=240x240&data='+encodeURIComponent(PEDIR_URL);
  renderTicket();
</script>
</body>
</html>
